# =====================================================================
# VIGIE — Stack complète V2
# =====================================================================

name: vigie

services:

  vector:
    image: timberio/vector:0.43.X-alpine
    container_name: vigie-vector
    restart: unless-stopped
    volumes:
      - ./config/vector.toml:/etc/vector/vector.toml:ro
      - /var/log:/host/var/log:ro
      - /var/lib/docker/containers:/host/containers:ro
      - ./lab/stacks:/host/app:ro
    environment:
      - VECTOR_LOG=warn
    depends_on:
      - loki
    networks: [vigie]

  loki:
    image: grafana/loki:3.3.0
    container_name: vigie-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yaml
    volumes:
      - ./config/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    networks: [vigie]

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: vigie-node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /:/host:ro,rslave
    command: ['--path.rootfs=/host']
    networks: [vigie]

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: vigie-prometheus
    restart: unless-stopped
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom-data:/prometheus
    networks: [vigie]

  grafana:
    image: grafana/grafana:11.4.0
    container_name: vigie-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-vigie-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana-datasources.yml:/etc/grafana/provisioning/datasources/ds.yml:ro
      - ./config/grafana/provisioning/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./config/grafana/provisioning/json:/etc/grafana/provisioning/dashboards/json:ro
    networks: [vigie]

  tempo:
    image: grafana/tempo:2.6.1
    container_name: vigie-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./config/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    networks: [vigie]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: vigie-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./config/otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - tempo
    networks: [vigie]

  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    container_name: vigie-agent
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - VIGIE_MOCK_LLM=${VIGIE_MOCK_LLM:-1}
      - VIGIE_API_TOKEN=${VIGIE_API_TOKEN:-}
      - LOKI_URL=http://loki:3100
      - PROMETHEUS_URL=http://prometheus:9090
      - TEMPO_URL=http://tempo:3200
      - VIGIE_DATA_DIR=/data
      - VIGIE_ALERT_INTERVAL_MINUTES=${VIGIE_ALERT_INTERVAL_MINUTES:-10}
      - VIGIE_SLACK_WEBHOOK_URL=${VIGIE_SLACK_WEBHOOK_URL:-}
      - MODEL_TRIAGE=claude-haiku-4-5-20251001
      - MODEL_DIAGNOSTIC=claude-sonnet-4-6
    volumes:
      - agent-data:/data
      - ./config/taxonomies:/app/config/taxonomies
    depends_on:
      - loki
      - prometheus
      - tempo
    networks: [vigie]

networks:
  vigie:

volumes:
  loki-data:
  prom-data:
  grafana-data:
  tempo-data:
  agent-data:
