name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r agent/requirements.txt
      - name: Ruff
        run: ruff check agent discovery cli tests
      - name: Pytest
        env:
          VIGIE_MOCK_LLM: "1"
          PYTHONPATH: .
        run: pytest tests/ -v
